<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Fantasy Trash Talk</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Fantasy basketball league management — drafts, trades, rosters and trash talk."
    />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F4F6FB" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#070B1A" />
    <link rel="icon" type="image/png" href="/icons/favicon.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FTT" />
    <style>
      /* Branded splash shown until Vue mounts — avoids the white flash on slow networks */
      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background-color: #0f183e;
        z-index: 9999;
      }
      #app-splash img {
        width: 112px;
        height: 112px;
        animation: app-splash-pulse 1.6s ease-in-out infinite;
      }
      #app-splash span {
        color: rgba(255, 255, 255, 0.85);
        font-family: system-ui, sans-serif;
        font-size: 15px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      @keyframes app-splash-pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(0.92);
          opacity: 0.8;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-splash img {
          animation: none;
        }
      }
    </style>
    <!-- Start Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      // When the single page app is loaded further down in this file,
      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
    <!-- End Single Page Apps for GitHub Pages -->
  </head>
  <body>
    <div id="app">
      <div id="app-splash">
        <img src="/assets/logo.png" alt="" />
        <span>Fantasy Trash Talk</span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
